<circle cx="216" cy="117" r="1.2" fill="#F5C040" opacity="0.55"/>
<circle cx="262" cy="124" r="1.8" fill="#FDE68A" opacity="0.6"/>
<circle cx="258" cy="110" r="1" fill="#F5C040" opacity="0.45"/>
<circle cx="240" cy="54" r="1.5" fill="#FFF0AA" opacity="0.5"/>
<circle cx="228" cy="82" r="1" fill="#FDE68A" opacity="0.4"/>
<circle cx="253" cy="90" r="0.9" fill="#FDE68A" opacity="0.4"/>

<!-- Fumée -->
<path d="M233,54 Q229,40 234,30 Q236,22 233,14" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
<path d="M240,52 Q244,36 241,26 Q239,18 243,10" fill="none" stroke="#888" stroke-width="1.2" stroke-linecap="round" opacity="0.09"/>
<path d="M248,57 Q252,42 249,32 Q247,24 250,16" fill="none" stroke="#888" stroke-width="1" stroke-linecap="round" opacity="0.07"/>

<!-- ── PIÈCE PRINCIPALE ── -->
<circle cx="184" cy="297" r="26" fill="#0A0A0A" opacity="0.12"/>
<circle cx="183" cy="294" r="26" fill="url(#coinGrad)"/>
<circle cx="183" cy="294" r="26" fill="none" stroke="#A07010" stroke-width="2.5"/>
<circle cx="183" cy="294" r="22" fill="none" stroke="#F0C040" stroke-width="0.8" opacity="0.5"/>
<ellipse cx="177" cy="285" rx="10" ry="6" fill="url(#coinShine)" opacity="0.55"/>
<text x="183" y="289" text-anchor="middle" dominant-baseline="central"
  font-family="Georgia, serif" font-size="13" font-weight="700" fill="#5C3008">F</text>
<text x="183" y="302" text-anchor="middle" dominant-baseline="central"
  font-family="Georgia, serif" font-size="9" font-weight="600" fill="#7A4A10" letter-spacing="1">CFA</text>
