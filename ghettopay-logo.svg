<rect x="212" y="214" width="56" height="7" rx="2" fill="#1A0A03" opacity="0.5"/>
<rect x="213" y="225" width="54" height="6" rx="2" fill="#220F05" opacity="0.45"/>
<rect x="212" y="235" width="56" height="6" rx="2" fill="#1A0A03" opacity="0.4"/>
<rect x="213" y="245" width="54" height="5" rx="2" fill="#220F05" opacity="0.35"/>
