<path d="M171,294 L194,294" stroke="#7A4A10" stroke-width="1.5" fill="none" opacity="0.6"/>
<path d="M189,290 L195,294 L189,298" fill="none" stroke="#7A4A10" stroke-width="1.5" stroke-linejoin="round" opacity="0.6"/>

<!-- ── PIÈCE SECONDAIRE ── -->
<circle cx="302" cy="310" r="20" fill="url(#coinGrad2)"/>
<circle cx="302" cy="310" r="20" fill="none" stroke="#8A6008" stroke-width="2"/>
<circle cx="302" cy="310" r="17" fill="none" stroke="#F0C040" stroke-width="0.6" opacity="0.4"/>
<ellipse cx="297" cy="303" rx="8" ry="4.5" fill="#FDE68A" opacity="0.28"/>
<text x="302" y="313" text-anchor="middle" dominant-baseline="central"
