<ellipse cx="240" cy="162" rx="36" ry="48" fill="#F5B230" opacity="0.09"/>

<!-- Corps principal -->
<path d="M240,202 C218,190 206,170 210,147 C213,130 222,117 230,102 C235,90 238,74 240,57 C242,74 245,90 250,102 C258,117 267,130 270,147 C274,170 262,190 240,202Z" fill="url(#flame1)"/>
<!-- Flamme gauche -->
<path d="M235,200 C220,190 212,172 215,152 C218,137 226,124 230,110 C233,98 236,82 237,67 C240,82 241,100 238,117 C235,134 230,150 234,167 C236,180 238,192 235,200Z" fill="url(#flame2)" opacity="0.75"/>
<!-- Flamme droite -->
<path d="M245,200 C260,190 268,172 265,152 C262,137 254,124 250,110 C247,98 244,82 243,67 C241,82 242,100 245,117 C248,134 253,150 249,167 C247,180 245,192 245,200Z" fill="url(#flame2)" opacity="0.7"/>
<!-- Cœur chaud -->
<path d="M240,200 C232,187 228,172 230,157 C232,144 238,132 240,117 C242,132 248,144 250,157 C252,172 248,187 240,200Z" fill="#FDE68A" opacity="0.9"/>
<path d="M240,198 C234,184 231,170 233,156 C235,145 239,134 240,122 C241,134 245,145 247,156 C249,170 246,184 240,198Z" fill="#FEFCE8" opacity="0.55"/>

<!-- Étincelles -->
