<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" width="480" height="560">
<defs>
  <linearGradient id="flame1" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#C8390A"/>
    <stop offset="40%" stop-color="#E8720C"/>
    <stop offset="75%" stop-color="#F5B230"/>
    <stop offset="100%" stop-color="#FDE87A" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="flame2" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#B02800"/>
    <stop offset="55%" stop-color="#D96010"/>
    <stop offset="100%" stop-color="#F5C040" stop-opacity="0.5"/>
  </linearGradient>
  <linearGradient id="stickGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#5C3A10"/>
    <stop offset="40%" stop-color="#7A4E1A"/>
    <stop offset="100%" stop-color="#4A2D0A"/>
  </linearGradient>
  <linearGradient id="headGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3D2208"/>
    <stop offset="50%" stop-color="#5C3010"/>
    <stop offset="100%" stop-color="#3A1E06"/>
  </linearGradient>
  <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F0C040"/>
    <stop offset="50%" stop-color="#D4A017"/>
    <stop offset="100%" stop-color="#A87010"/>
  </linearGradient>
  <linearGradient id="coinShine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="coinGrad2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#D4A017"/>
    <stop offset="100%" stop-color="#8A6008"/>
  </linearGradient>
  <radialGradient id="auraGlow" cx="50%" cy="55%" r="50%">
    <stop offset="0%" stop-color="#F5A020" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#F5A020" stop-opacity="0"/>
  </radialGradient>
  <pattern id="woodGrain" x="0" y="0" width="4" height="8" patternUnits="userSpaceOnUse">
    <line x1="0" y1="2" x2="4" y2="2" stroke="#3A1E06" stroke-width="0.4" stroke-opacity="0.35"/>
    <line x1="0" y1="6" x2="4" y2="6" stroke="#7A4E1A" stroke-width="0.3" stroke-opacity="0.2"/>
  </pattern>
</defs>

<!-- Fond blanc -->
<rect width="480" height="560" fill="white"/>

<!-- Halo chaleur -->
<ellipse cx="240" cy="200" rx="150" ry="130" fill="url(#auraGlow)"/>

<!-- ── MANCHE ── -->
<rect x="226" y="252" width="28" height="160" rx="6" fill="url(#stickGrad)"/>
<rect x="226" y="252" width="28" height="160" rx="6" fill="url(#woodGrain)" opacity="0.6"/>
<rect x="230" y="252" width="4" height="160" rx="2" fill="#9C6830" opacity="0.25"/>
<rect x="246" y="252" width="3" height="160" rx="1.5" fill="#2E1605" opacity="0.2"/>
<!-- Nœuds bois -->
<ellipse cx="237" cy="298" rx="5" ry="2.5" fill="#2E1605" opacity="0.3"/>
<ellipse cx="241" cy="360" rx="4" ry="2" fill="#2E1605" opacity="0.25"/>
<!-- Grip wrapping -->
<line x1="226" y1="322" x2="254" y2="327" stroke="#1A0D04" stroke-width="2.5" opacity="0.45"/>
<line x1="226" y1="331" x2="254" y2="336" stroke="#1A0D04" stroke-width="2" opacity="0.35"/>
<line x1="226" y1="340" x2="254" y2="344" stroke="#1A0D04" stroke-width="1.5" opacity="0.28"/>
<!-- Embout bas -->
<rect x="223" y="394" width="34" height="16" rx="5" fill="#2E1205"/>

<!-- ── TÊTE TORCHE ── -->
<rect x="213" y="207" width="54" height="55" rx="8" fill="url(#headGrad)"/>
<rect x="213" y="207" width="54" height="55" rx="8" fill="url(#woodGrain)" opacity="0.5"/>
